name: Sidecar Image

on:
  pull_request:
    branches: [main]
    paths:
      - sidecar/**
      - .github/workflows/sidecar-image.yml
  push:
    branches: [main]
    paths:
      - sidecar/**
      - .github/workflows/sidecar-image.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: sidecar-image-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  dockerfile:
    name: Validate sidecar Dockerfile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build harness layer
        run: |
          docker build \
            -f sidecar/Dockerfile.all-harness \
            --target harnesses \
            --build-arg BLUEPRINT_HARNESSES=all \
            --build-arg SIDECAR_BASE_IMAGE=scratch \
            -t blueprint-sidecar-harnesses:test .

  publish:
    name: Publish all-harness sidecar
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && github.repository == 'tangle-network/ai-agent-sandbox-blueprint' && vars.BLUEPRINT_SIDECAR_SERVER_IMAGE != ''
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: sidecar/Dockerfile.all-harness
          push: true
          tags: |
            ghcr.io/tangle-network/blueprint-sidecar:all-harness
            ghcr.io/tangle-network/blueprint-sidecar:all-harness-${{ github.sha }}
          build-args: |
            BLUEPRINT_HARNESSES=all
            SIDECAR_BASE_IMAGE=${{ vars.BLUEPRINT_SIDECAR_SERVER_IMAGE }}
