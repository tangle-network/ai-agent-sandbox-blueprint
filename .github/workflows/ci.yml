name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt

      - name: Check Formatting
        run: cargo fmt -- --check

  lint:
    timeout-minutes: 120
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Verify Forge installation
        run: forge --version

      - name: Install Solidity Dependencies
        run: forge soldeer update -d

      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: clippy

      - uses: swatinem/rust-cache@v2
        with:
          cache-on-failure: "true"

      - name: Forge build
        run: forge update && forge build

      - uses: taiki-e/github-actions/free-device-space@main

      - name: Run Clippy
        run: cargo clippy --tests --examples -- -D warnings

      - name: Run Clippy (QoS feature)
        run: cargo clippy -p ai-agent-sandbox-blueprint-bin --features qos --tests -- -D warnings

      - name: Run Clippy (TEE features)
        run: cargo clippy -p sandbox-runtime --features tee-all --tests -- -D warnings

      - name: Run Clippy (instance blueprints)
        run: cargo clippy -p ai-agent-instance-blueprint-lib -p ai-agent-tee-instance-blueprint-lib --tests -- -D warnings

  test:
    timeout-minutes: 90
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Verify Forge installation
        run: forge --version

      - name: Install Solidity Dependencies
        run: forge soldeer update -d

      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: clippy

      - uses: swatinem/rust-cache@v2
        with:
          cache-on-failure: "true"

      - uses: taiki-e/install-action@v2
        with:
          tool: nextest

      - name: Forge build
        run: forge update && forge build

      - uses: taiki-e/github-actions/free-device-space@main

      - name: tests
        run: cargo nextest run

      - name: TEE unit tests
        run: cargo nextest run -p sandbox-runtime --features tee-all,test-utils

      - name: TEE instance lib tests
        run: cargo nextest run -p ai-agent-tee-instance-blueprint-lib

      - name: TEE binary compiles
        run: cargo build -p ai-agent-tee-instance-blueprint --release 2>&1 | tail -1

  ui:
    name: UI build & typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace UI packages
        run: pnpm build
        working-directory: packages/agent-ui

      - name: TypeScript check
        run: pnpm exec tsc --noEmit
        working-directory: ui

      - name: Tests
        run: pnpm test
        working-directory: ui

  contracts:
    name: Solidity tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: foundry-rs/foundry-toolchain@v1
      - name: Install Solidity Dependencies
        run: forge soldeer update -d
      - name: Build
        run: forge build
      - name: Test
        run: forge test -vvv

  security:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@cargo-audit
      - name: Run cargo audit
        # RUSTSEC-2025-0009: ring 0.16.20 — transitive dep via blueprint-sdk, no fix available
        # RUSTSEC-2025-0055: tracing-subscriber — transitive dep via blueprint-sdk
        # RUSTSEC-2025-0111: tokio-tar — transitive dep, no fix available
        # Yanked crates (e.g. keccak 0.1.5) are warnings by default, not errors
        # RUSTSEC-2026-0037: quinn-proto — transitive dep via libp2p, no fix available
        # RUSTSEC-2026-0044..0048: aws-lc-sys 0.37.0 — transitive dep via rustls, no fix available
        # RUSTSEC-2026-0049: rustls-webpki — transitive dep via rustls, no fix available
        # RUSTSEC-2026-0067, 0068: tar 0.4.44 — transitive dep, no patched version
        run: >
          cargo audit
          --ignore RUSTSEC-2025-0009
          --ignore RUSTSEC-2025-0055
          --ignore RUSTSEC-2025-0111
          --ignore RUSTSEC-2026-0037
          --ignore RUSTSEC-2026-0044
          --ignore RUSTSEC-2026-0045
          --ignore RUSTSEC-2026-0046
          --ignore RUSTSEC-2026-0047
          --ignore RUSTSEC-2026-0048
          --ignore RUSTSEC-2026-0049
          --ignore RUSTSEC-2026-0067
          --ignore RUSTSEC-2026-0068
          --ignore RUSTSEC-2026-0098
          --ignore RUSTSEC-2026-0099

  e2e:
    name: E2E tests
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: [test]
    steps:
      - uses: actions/checkout@v4

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Install Solidity Dependencies
        run: forge soldeer update -d

      - name: Forge build
        run: forge update && forge build

      - uses: dtolnay/rust-toolchain@nightly

      - uses: swatinem/rust-cache@v2
        with:
          cache-on-failure: "true"

      - uses: taiki-e/install-action@v2
        with:
          tool: nextest

      - name: Fetch TNT core artifacts
        run: scripts/fetch-localtestnet-fixtures.sh

      - uses: taiki-e/github-actions/free-device-space@main

      - name: Pull sidecar image
        id: sidecar
        run: |
          echo "::group::Login to GHCR"
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          echo "::endgroup::"
          if docker pull ghcr.io/tangle-network/sidecar:latest; then
            docker tag ghcr.io/tangle-network/sidecar:latest tangle-sidecar:local
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::Sidecar image not available — E2E tests will be skipped"
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run E2E tests (sandbox)
        if: steps.sidecar.outputs.available == 'true'
        env:
          SIDECAR_E2E: "1"
          SIDECAR_PUBLIC_HOST: "127.0.0.1"
          REQUEST_TIMEOUT_SECS: "60"
        run: cargo nextest run --test-threads=1 -p ai-agent-sandbox-blueprint-lib --test e2e_operator_api --test anvil

      - name: Run E2E tests (instance)
        if: steps.sidecar.outputs.available == 'true'
        env:
          SIDECAR_E2E: "1"
          SIDECAR_PUBLIC_HOST: "127.0.0.1"
          REQUEST_TIMEOUT_SECS: "60"
        run: cargo nextest run --test-threads=1 -p ai-agent-instance-blueprint-lib --test e2e_instance

      - name: Run lifecycle bench (real sidecar)
        if: steps.sidecar.outputs.available == 'true'
        env:
          REAL_SIDECAR: "1"
          LIFECYCLE_BENCH: "1"
          LIFECYCLE_N: "5"
          SIDECAR_PUBLIC_HOST: "127.0.0.1"
          REQUEST_TIMEOUT_SECS: "120"
        run: cargo test -p ai-agent-sandbox-blueprint-lib --test lifecycle_bench -- --test-threads=1 --nocapture

      - name: Upload lifecycle bench results
        if: steps.sidecar.outputs.available == 'true' && always()
        uses: actions/upload-artifact@v4
        with:
          name: lifecycle-bench-${{ github.sha }}
          path: bench-results/lifecycle-real.json
          retention-days: 90
          if-no-files-found: ignore

      - name: E2E skipped (no sidecar image)
        if: steps.sidecar.outputs.available != 'true'
        run: echo "E2E tests skipped — sidecar Docker image not available. Publish ghcr.io/tangle-network/sidecar:latest to enable."

  firecracker-real-e2e:
    name: Firecracker real E2E (KVM)
    if: ${{ vars.ENABLE_FIRECRACKER_REAL_E2E == 'true' }}
    runs-on: [self-hosted, linux, x64, kvm]
    timeout-minutes: 60
    needs: [test]
    env:
      FIRECRACKER_E2E: "1"
      FIRECRACKER_REAL_E2E: "1"
      FIRECRACKER_HOST_AGENT_URL: ${{ secrets.FIRECRACKER_HOST_AGENT_URL }}
      FIRECRACKER_HOST_AGENT_API_KEY: ${{ secrets.FIRECRACKER_HOST_AGENT_API_KEY }}
      FIRECRACKER_SIDECAR_AUTH_DISABLED: "true"
      FIRECRACKER_TEST_IMAGE: ${{ vars.FIRECRACKER_TEST_IMAGE != '' && vars.FIRECRACKER_TEST_IMAGE || '/var/lib/firecracker/rootfs/sidecar.ext4' }}
      REQUEST_TIMEOUT_SECS: "60"
    steps:
      - uses: actions/checkout@v4

      - name: Verify KVM availability
        run: |
          test -e /dev/kvm || (echo "/dev/kvm not found on runner" && exit 1)
          test -r /dev/kvm || (echo "/dev/kvm is not readable" && exit 1)

      - name: Verify Firecracker host-agent config
        run: |
          test -n "${FIRECRACKER_HOST_AGENT_URL}" || (echo "FIRECRACKER_HOST_AGENT_URL secret is required" && exit 1)

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Install Solidity Dependencies
        run: forge soldeer update -d

      - name: Forge build
        run: forge update && forge build

      - uses: dtolnay/rust-toolchain@nightly

      - uses: swatinem/rust-cache@v2
        with:
          cache-on-failure: "true"

      - name: Fetch TNT core artifacts
        run: scripts/fetch-localtestnet-fixtures.sh

      - name: Run Firecracker real-path anvil E2E
        run: cargo test -p ai-agent-sandbox-blueprint-lib --test anvil runs_firecracker_jobs_end_to_end -- --nocapture --test-threads=1

  bench:
    name: Benchmarks (regression gate)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Run on PRs to detect regressions, and on main to refresh the baseline.
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - uses: dtolnay/rust-toolchain@nightly

      - uses: swatinem/rust-cache@v2
        with:
          cache-on-failure: "true"
          shared-key: bench

      - uses: taiki-e/github-actions/free-device-space@main

      - name: Build bench harness
        run: cargo build -p bench-harness --release

      - name: Build benches
        run: cargo build -p sandbox-runtime --benches --features test-utils --release

      - name: Run benches (quick mode)
        run: ./scripts/run-benches.sh --quick
        env:
          SESSION_AUTH_SECRET: ci-bench-secret-do-not-use-in-production

      - name: Download baseline (main branch)
        if: github.event_name == 'pull_request'
        uses: dawidd6/action-download-artifact@v6
        continue-on-error: true
        with:
          workflow: ci.yml
          branch: main
          name: bench-baseline
          path: bench-results/baseline/
          if_no_artifact_found: warn

      - name: Compare to baseline
        if: github.event_name == 'pull_request'
        run: |
          if [ -f bench-results/baseline/latest.json ]; then
            cargo run -p bench-harness --release -- compare \
              --baseline bench-results/baseline/latest.json \
              --current  bench-results/latest.json \
              --mean-threshold 0.10 \
              --p99-threshold 0.15 \
              --markdown-output bench-results/comparison.md
          else
            echo "No baseline available — skipping comparison (first run on this branch)."
          fi

      - name: Upload current run as artifact
        uses: actions/upload-artifact@v4
        with:
          name: bench-results-${{ github.sha }}
          path: bench-results/
          retention-days: 90

      - name: Upload as new baseline (main branch only)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: bench-baseline
          path: bench-results/latest.json
          retention-days: 90

      - name: Add comparison to PR summary
        if: github.event_name == 'pull_request' && always()
        run: |
          if [ -f bench-results/comparison.md ]; then
            cat bench-results/comparison.md >> "$GITHUB_STEP_SUMMARY"
          fi

  coverage:
    name: Code coverage
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Install Solidity Dependencies
        run: forge soldeer update -d

      - name: Forge build
        run: forge update && forge build

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          cache-on-failure: "true"

      - uses: taiki-e/install-action@cargo-tarpaulin

      - uses: taiki-e/github-actions/free-device-space@main

      - name: Run coverage
        run: >
          cargo tarpaulin --workspace --features tee-all --out xml --skip-clean --timeout 300 --fail-under 50
          --jobs 2
          --exclude ai-agent-sandbox-blueprint-bin
          --exclude ai-agent-instance-blueprint-bin
          --exclude ai-agent-tee-instance-blueprint-bin

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: env.CODECOV_TOKEN != ''
        with:
          file: cobertura.xml
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
