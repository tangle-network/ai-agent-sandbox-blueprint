name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: rust-validation-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt

      - name: Check Formatting
        run: cargo fmt -- --check

  lint:
    timeout-minutes: 120
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Verify Forge installation
        run: forge --version

      - name: Install Solidity Dependencies
        run: forge soldeer update -d

      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: clippy

      - uses: swatinem/rust-cache@v2
        with:
          cache-on-failure: "true"

      - name: Forge build
        run: forge update && forge build

      - uses: taiki-e/github-actions/free-device-space@main

      - name: Run Clippy
        run: cargo clippy --tests --examples -- -D warnings

  test:
    timeout-minutes: 90
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Verify Forge installation
        run: forge --version

      - name: Install Solidity Dependencies
        run: forge soldeer update -d

      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: clippy

      - uses: swatinem/rust-cache@v2
        with:
          cache-on-failure: "true"

      - uses: taiki-e/install-action@v2
        with:
          tool: nextest

      - name: Forge build
        run: forge update && forge build

      - uses: taiki-e/github-actions/free-device-space@main

      - name: tests
        run: cargo nextest run

  ui:
    name: UI build & typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript check
        run: pnpm exec tsc --noEmit
        working-directory: ui

      - name: Tests
        run: pnpm test
        working-directory: ui

  contracts:
    name: Solidity tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: foundry-rs/foundry-toolchain@v1
      - name: Install Solidity Dependencies
        run: forge soldeer update -d
      - name: Build
        run: forge build
      - name: Test
        run: forge test -vvv

  security:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@cargo-audit
      - name: Run cargo audit
        # RUSTSEC-2025-0009: ring 0.16.20 — transitive dep via blueprint-sdk, no fix available
        # RUSTSEC-2025-0111: tokio-tar — transitive dep, no fix available
        # --ignore-yanked: keccak 0.1.5 yanked, transitive dep
        run: cargo audit --ignore RUSTSEC-2025-0009 --ignore RUSTSEC-2025-0111 --ignore-yanked

  coverage:
    name: Code coverage
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Install Solidity Dependencies
        run: forge soldeer update -d

      - name: Forge build
        run: forge update && forge build

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          cache-on-failure: "true"

      - uses: taiki-e/install-action@cargo-tarpaulin

      - uses: taiki-e/github-actions/free-device-space@main

      - name: Run coverage
        run: cargo tarpaulin --workspace --out xml --skip-clean --timeout 300

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: env.CODECOV_TOKEN != ''
        with:
          file: cobertura.xml
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
