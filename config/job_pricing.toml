# AI Agent Sandbox Blueprint pricing profile
#
# Canonical on-chain jobs are IDs 0..4:
# 0 SANDBOX_CREATE
# 1 SANDBOX_DELETE
# 2 WORKFLOW_CREATE
# 3 WORKFLOW_TRIGGER
# 4 WORKFLOW_CANCEL
#
# Instance lifecycle is operator-reported (reportProvisioned/reportDeprovisioned),
# so instance and tee_instance modes only price workflow jobs (2..4).

[sandbox]

[sandbox.jobs.0]
name       = "SANDBOX_CREATE"
mode       = "dynamic"
multiplier = 50
base_price = "50000000000000000"
description = "Create sandbox with resource-weighted pricing"

[sandbox.jobs.0.dynamic]
cpu_rate_per_core = "5000000000000000"
mem_rate_per_gb   = "3000000000000000"
disk_rate_per_gb  = "1000000000000000"

[sandbox.jobs.1]
name       = "SANDBOX_DELETE"
mode       = "flat"
multiplier = 1
price      = "1000000000000000"

[sandbox.jobs.2]
name       = "WORKFLOW_CREATE"
mode       = "flat"
multiplier = 2
price      = "2000000000000000"

[sandbox.jobs.3]
name       = "WORKFLOW_TRIGGER"
mode       = "flat"
multiplier = 5
price      = "5000000000000000"

[sandbox.jobs.4]
name       = "WORKFLOW_CANCEL"
mode       = "free"
multiplier = 1
price      = "0"

[instance]

[instance.jobs.2]
name       = "WORKFLOW_CREATE"
mode       = "flat"
multiplier = 2
price      = "2000000000000000"

[instance.jobs.3]
name       = "WORKFLOW_TRIGGER"
mode       = "flat"
multiplier = 5
price      = "5000000000000000"

[instance.jobs.4]
name       = "WORKFLOW_CANCEL"
mode       = "free"
multiplier = 1
price      = "0"

[tee_instance]

[tee_instance.jobs.2]
name       = "WORKFLOW_CREATE"
mode       = "flat"
multiplier = 2
price      = "2000000000000000"

[tee_instance.jobs.3]
name       = "WORKFLOW_TRIGGER"
mode       = "flat"
multiplier = 5
price      = "5000000000000000"

[tee_instance.jobs.4]
name       = "WORKFLOW_CANCEL"
mode       = "free"
multiplier = 1
price      = "0"
